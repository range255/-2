<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>母亲节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
            background: #fff;
            color: #ff99bb;
            text-align: center;
            padding: 30px 20px;
            min-height: 100vh;
        }
        .envelope {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #ffd6e4;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            cursor: pointer;
            transition: opacity 0.6s ease;
        }
        .envelope-box {
            width: 80vw;
            max-width: 320px;
            height: 400px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: #ffb3d9;
            clip-path: polygon(0 0, 50% 50%, 100% 0);
        }
        .envelope-text {
            font-size: 26px;
            color: #ff6699;
            font-weight: bold;
            margin-top: 20px;
            z-index: 10;
        }
        .envelope-tip {
            font-size: 14px;
            color: #ff80b3;
            margin-top: 10px;
            opacity: 0.8;
        }
        .heart {
            width: 50px;
            height: 50px;
            background: #ff6699;
            transform: rotate(45deg);
            position: relative;
            margin: 40px 0 20px;
            z-index: 1;
        }
        .heart::before,
        .heart::after {
            content: '';
            width: 50px;
            height: 50px;
            background: #ff6699;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { left: 0; top: -25px; }
        .heart::after { left: -25px; top: 0; }
        .card-content {
            display: none;
        }
        .title-img {
            width: 90%;
            max-width: 400px;
            margin: 0 auto 30px;
        }
        .blessing-text {
            font-size: 17px;
            line-height: 2;
            color: #ff99bb;
            text-align: left;
            width: 92%;
            max-width: 400px;
            margin: 0 auto 40px;
        }
        .music-btn {
            position: fixed;
            left: 20px;
            top: 20px;
            background: rgba(255,153,187,0.95);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 14px;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div class="envelope" id="envelope">
    <div class="envelope-box">
        <div class="envelope-flap"></div>
        <div class="heart"></div>
        <div class="envelope-text">致 最爱的老妈</div>
        <div class="envelope-tip">点击信封打开祝福 ✨</div>
    </div>
</div>

<div class="card-content" id="cardContent">
    <div class="blessing-text">
to：老妈<br>
很高兴你陪我们三个长大<br>
虽然你总是啰嗦我们<br>
但是我们知道你是为了我们好<br>
是想让我们变得更好<br>
很抱歉老妈<br>
我们总是难以启齿说爱你<br>
也只能以这种方式来表达我们的爱<br>
等以后我们有能力了<br>
一定补上最好的礼物给你<br>
谢谢你老妈，爱你老妈<br>
母亲节快乐<br>
也不止母亲节，天天快乐
    </div>
</div>

<audio id="bgm" loop>
<source src="Blizzard - 颜色(氛围版).mp3" type="audio/mpeg">


<button class="music-btn" id="musicBtn">播放</button>

<script>
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
let isPlay = false;

// 点击信封只切换页面，不自动播音乐
document.getElementById('envelope').addEventListener('click', function(){
    this.style.opacity = '0';
    setTimeout(()=>{ this.style.display = 'none'; }, 600);
    document.getElementById('cardContent').style.display = 'block';
});

// 必须手动点按钮才播放
musicBtn.addEventListener('click', function(){
    if(!isPlay){
        bgm.play();
        this.innerText = '暂停';
        isPlay = true;
    }else{
        bgm.pause();
        this.innerText = '播放';
        isPlay = false;
    }
});
</script>

</body>
</html>
